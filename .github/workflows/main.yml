name: Generate AI Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: bhoomika002

          outputs: |

            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=8A2BE2&color_dots=#161B22,#1F2937,#4C1D95,#7C3AED,#A855F7

            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=0A66C2&color_dots=#ebedf0,#c6e48b,#7bc96f,#239a3b,#196127

      - name: Push Snake Animation to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
