name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: bhoomika002

          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light

            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=BB86FC&color_dots=#161B22,#312E81,#5B21B6,#7C3AED,#A855F7,#E9D5FF

      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
