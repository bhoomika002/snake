name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: bhoomika002
          outputs: |
            dist/github-contribution-grid-snake.svg
          
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00E5FF&color_dots=#0D1117,#082F49,#0369A1,#06B6D4,#67E8F9
             
      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
